x-app-env: &app-env
  DATA_DIR: "${DATA_DIR:-data}"
  BASE_DB_PATH: "${BASE_DB_PATH:-data/base_data.db}"
  SCORING_DB_PATH: "${SCORING_DB_PATH:-data/scoring.db}"
  TRADING_DB_PATH: "${TRADING_DB_PATH:-data/trading.db}"
  MARKET_DB_PATH: "${MARKET_DB_PATH:-data/market.db}"
  BINANCE_TESTNET: "${BINANCE_TESTNET:-true}"
  BINANCE_TESTNET_API_KEY: "${BINANCE_TESTNET_API_KEY:-YOUR_TESTNET_API_KEY}"
  BINANCE_TESTNET_SECRET_KEY: "${BINANCE_TESTNET_SECRET_KEY:-YOUR_TESTNET_SECRET_KEY}"
  BINANCE_REAL_API_KEY: "${BINANCE_REAL_API_KEY:-YOUR_REAL_API_KEY}"
  BINANCE_REAL_API_SECRET: "${BINANCE_REAL_API_SECRET:-YOUR_REAL_API_SECRET}"

services:
  worker:
    build: .
    image: trading-sys-demo:latest
    container_name: trade
    command: ["worker"]
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: always
    environment:
      <<: *app-env
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - ${HOST_LOGS_DIR:-./logs}:/app/logs

  web:
    build: .
    image: trading-sys-demo:latest
    container_name: trade-web
    command: ["web"]
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: always
    ports:
      - "5000:5000"
    environment:
      <<: *app-env
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - ${HOST_LOGS_DIR:-./logs}:/app/logs
    depends_on:
      - worker
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  sqlite-web:
    image: coleifer/sqlite-web
    container_name: sqlite-web
    ports:
      - "8080:8080"
    volumes:
      - ${HOST_DATA_DIR:-./data}:/data
    command: ["sqlite_web", "${SQLITE_WEB_DB_PATH:-/data/base_data.db}", "--host", "0.0.0.0"]
    depends_on:
      - worker
